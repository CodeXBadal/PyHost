version: "3.9"

services:
  bot:
    build: .
    container_name: pyhost_bot
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./user_data:/app/user_data
      - /var/run/docker.sock:/var/run/docker.sock      # bot manages sibling containers
    depends_on:
      - mongo
    networks: [pyhost_net]

  mongo:
    image: mongo:7
    container_name: pyhost_mongo
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    networks: [pyhost_net]

volumes:
  mongo_data:

networks:
  pyhost_net:
    driver: bridge
